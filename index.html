<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>MediaPipe × GAS 連携アプリ</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        #webcam { width: 320px; height: 240px; transform: scaleX(-1); background-color: #ccc; }
        #status { font-weight: bold; color: #333; }
    </style>
    <!-- 【目印①の場所】このスクリプトタグの中に、後からメインライブラリのURLを合体させます -->
    <script id="mainLibraryScript"></script>
</head>
<body>
    <h1>MediaPipe × GAS 連携テスト</h1>
    
    <video id="webcam" autoplay playsinline style="width: 320px; height: 240px; transform: scaleX(-1);"></video>
    <br><br>
    
    <p id="status">MediaPipe初期化中...</p>

    <script>
        // --------------------------------------------------
        // 【目印①：メインライブラリとWASMの共通URLの組み立て】
        // --------------------------------------------------
        const domainJsdelivr = "https://" + "cdn." + "jsdelivr" + ".net/";
        const pathMediaPipe = "npm/@mediapipe/tasks-vision@0.10.8/";
        const cdnFullUrl = domainJsdelivr + pathMediaPipe;
        
        // 【目印①の合体処理】一番上のスクリプトタグに正しいフルURLをセットします
        document.getElementById("mainLibraryScript").src = cdnFullUrl + "wasm/vision_bundle.js";

        const video = document.getElementById('webcam');
        const statusText = document.getElementById('status');
        
        // --------------------------------------------------
        // 【目印②：あなたのGASウェブアプリURLの組み立て】
        // --------------------------------------------------
        const gasPart1 = "https://" + "script." + "google" + ".com/macros/s/";
        const gasPart2 = "AKfycbysSGzFaaHnLPqtirCokY6SiVl98_qPUfA9g5QPBw6OjdOQ3anP9clYtYMfA65C-g3i";
        const gasPart3 = "/exec";
        const GAS_URL = gasPart1 + gasPart2 + gasPart3;

        let handLandmarker;
        let isSending = false;

        // ライブラリの読み込み完了を1秒待ってから初期化をスタート
        window.addEventListener('load', () => {
            setTimeout(initMediaPipe, 1000);
        });

        async function initMediaPipe() {
            try {
                if (typeof mpTasksVision === "undefined") {
                    statusText.innerText = "❌ ライブラリの読み込み待ちです。もう一度ページを再読み込みしてください。";
                    return;
                }
                
                const { HandLandmarker, FilesetResolver } = mpTasksVision;
                statusText.innerText = "1/3: AIライブラリ読み込み完了。WASMを読み込み中...";
                
                // --------------------------------------------------
                // 【目印③：WASMファイルを読み込むURLの指定】
                // --------------------------------------------------
                const vision = await FilesetResolver.forVisionTasks(cdnFullUrl + "wasm");
                
                statusText.innerText = "2/3: 手の検出モデルをロード中...";
                
                // --------------------------------------------------
                // 【目印④：AIモデルファイル（手の骨格データ）URLの組み立て】
                // --------------------------------------------------
                const domainGoogleStorage = "https://" + "storage." + "googleapis" + ".com/";
                const pathModelTask = "mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task";
                const modelUrl = domainGoogleStorage + pathModelTask;
                
                handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: modelUrl,
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO",
                    numHands: 2
                });
                
                statusText.innerText = "3/3: カメラを起動しています...";
                startCamera();
            } catch (e) {
                statusText.innerText = "❌ エラー発生: " + e.message;
                console.error(e);
            }
        }

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: true })
                .then((stream) => {
                    video.srcObject = stream;
                    video.addEventListener('loadeddata', predictWebcam);
                    statusText.innerText = "✅ 準備完了！カメラに向かって手を映してください。";
                })
                .catch((err) => {
                    statusText.innerText = "❌ カメラの起動に失敗しました: " + err;
                });
        }

        let lastVideoTime = -1;
        async function predictWebcam() {
            if (video.currentTime !== lastVideoTime && handLandmarker) {
                lastVideoTime = video.currentTime;
                const results = handLandmarker.predictForVideo(video, performance.now());
                
                if (results.landmarks && results.landmarks.length > 0) {
                    const currentResult = `✋ 手が ${results.landmarks.length} つ検出されています！`;
                    statusText.innerText = currentResult;

                    if (!isSending) {
                        sendToGAS(currentResult);
                    }
                } else {
                    statusText.innerText = "👋 手を探しています... カメラに手をかざしてください。";
                }
            }
            window.requestAnimationFrame(predictWebcam);
        }

        async function sendToGAS(message) {
            isSending = true;
            try {
                await fetch(GAS_URL, {
                    method: "POST",
                    mode: "cors",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({ resultMessage: message })
                });
                setTimeout(() => { isSending = false; }, 3000);
            } catch (error) {
                setTimeout(() => { isSending = false; }, 5000);
            }
        }
    </script>
</body>
</html>
