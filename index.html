<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>MediaPipe × GAS 連携アプリ</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        #webcam { width: 320px; height: 240px; transform: scaleX(-1); background-color: #ccc; }
        #status { font-weight: bold; color: #333; }
    </style>
    <!-- 1. 削れてしまっていたライブラリの正しいフルURLに修正しました -->
    <script src="https://jsdelivr.net" crossorigin="anonymous"></script>
</head>
<body>
    <h1>MediaPipe × GAS 連携テスト</h1>
    
    <video id="webcam" autoplay playsinline style="width: 320px; height: 240px; transform: scaleX(-1);"></video>
    <br><br>
    
    <p id="status">MediaPipe初期化中...</p>

    <script>
        // 2. グローバルオブジェクトから安全に取得して起動します
        const { HandLandmarker, FilesetResolver } = mpTasksVision;

        const video = document.getElementById('webcam');
        const statusText = document.getElementById('status');
        
        // 先ほど「送信成功」を叩き出した、あなたの本物のGASウェブアプリURLに戻しました
        const GAS_URL = "https://google.com";

        let handLandmarker;
        let isSending = false;

        // 1. MediaPipeの初期化
        async function initMediaPipe() {
            try {
                statusText.innerText = "1/3: AIライブラリ読み込み完了。WASMを読み込み中...";
                // 削れてしまっていたWASM読み込み用の正しいフルURLです
                const vision = await FilesetResolver.forVisionTasks(
                    "https://jsdelivr.net"
                );
                
                statusText.innerText = "2/3: 手の検出モデルをロード中...";
                // 削れてしまっていたAIモデルファイル（手の骨格）の正しいフルURLです
                handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: "https://googleapis.com",
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO",
                    numHands: 2
                });
                
                statusText.innerText = "3/3: カメラを起動しています...";
                startCamera();
            } catch (e) {
                statusText.innerText = "❌ エラー発生: " + e.message;
                console.error(e);
            }
        }

        // 2. カメラの起動
        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: true })
                .then((stream) => {
                    video.srcObject = stream;
                    video.addEventListener('loadeddata', predictWebcam);
                    statusText.innerText = "✅ 準備完了！カメラに向かって手を映してください。";
                })
                .catch((err) => {
                    statusText.innerText = "❌ カメラの起動に失敗しました: " + err;
                });
        }

        // 3. リアルタイムで手の骨格を解析するループ
        let lastVideoTime = -1;
        async function predictWebcam() {
            if (video.currentTime !== lastVideoTime && handLandmarker) {
                lastVideoTime = video.currentTime;
                const results = handLandmarker.predictForVideo(video, performance.now());
                
                // 画面に手が映ったときの処理
                if (results.landmarks && results.landmarks.length > 0) {
                    const currentResult = `✋ 手が ${results.landmarks.length} つ検出されています！`;
                    statusText.innerText = currentResult;

                    // GASが送信中でなければ、自動でデータを送信する
                    if (!isSending) {
                        sendToGAS(currentResult);
                    }
                } else {
                    statusText.innerText = "👋 手を探しています... カメラに手をかざしてください。";
                }
            }
            window.requestAnimationFrame(predictWebcam);
        }

        // 4. GASへの自動送信
        async function sendToGAS(message) {
            isSending = true; // 送信中ロック
            try {
                await fetch(GAS_URL, {
                    method: "POST",
                    mode: "cors",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({ resultMessage: message })
                });
                // 送信に成功したら3秒間は次の自動送信を防ぐ（連続送信の制限）
                setTimeout(() => { isSending = false; }, 3000);
            } catch (error) {
                setTimeout(() => { isSending = false; }, 5000);
            }
        }

        // アプリ起動
        initMediaPipe();
    </script>
</body>
</html>
