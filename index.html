<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>色・方向ダブル記憶 × アクションカウンター</title>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000; font-family: sans-serif;
        }

        .camera-container {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            overflow: hidden;
        }
        
        #webcam { width: 100%; height: 100%; object-fit: cover; }
        #output_canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* 📱 UIレイヤー */
        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; padding: 20px;
            box-sizing: border-box;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
            pointer-events: none; text-align: center; z-index: 10;
        }

        h1 { font-size: 1.1rem; margin: 0 0 5px 0; color: #fff; }
        .sub-title { font-size: 0.8rem; color: #00FF66; margin: 0 0 10px 0; font-weight: bold; }
        
        .counters-wrapper { display: flex; justify-content: center; gap: 15px; margin-top: 5px; }
        .counter-box {
            background: rgba(0, 0, 0, 0.6); padding: 8px 15px; border-radius: 20px;
            font-size: 1.1rem; font-weight: bold; color: #fff; min-width: 120px;
        }
        .count-num { font-size: 2rem; margin-left: 8px; vertical-align: middle; }
        #count_numA { color: #00FF66; }
        #count_numB { color: #FFCC00; }

        #status { font-weight: bold; color: #ddd; margin: 12px 0 0 0; font-size: 0.9rem; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
</head>
<body>

    <div class="camera-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <div class="ui-layer">
        <h1>特定人物追従カウンター</h1>
        <div class="sub-title">タップでロック。見失っても「消えた方向」と「服の色」が一致すれば自動復帰します</div>
        <div class="counters-wrapper">
            <div class="counter-box">手を挙げる(A): <span id="count_numA" class="count-num">0</span></div>
            <div class="counter-box">しゃがむ(b): <span id="count_numB" class="count-num">0</span></div>
        </div>
        <p id="status">ｼｽﾃﾑ起動中...</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <script>
        const video = document.getElementById('webcam');
        const statusText = document.getElementById('status');
        const countNumA = document.getElementById('count_numA');
        const countNumB = document.getElementById('count_numB');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');

        let countA = 0;
        let countB = 0;

        let wasHandDown = true;
        let wasStanding = true;
        let defaultHipY = null; 

        // 🎯 ロックオン＆特徴データ管理
        let latestLandmarks = null;
        let isLocked = false;               // ロックオンが有効かどうか
        let isTargetVisible = false;        // ロックしたターゲットが現在見えているか
        
        // 🧠 ターゲットの特徴記憶バンク
        let savedColor = null;              // ターゲットの服の色（HSL）
        let lastKnownNosePosition = { x: 0.5, y: 0.5 }; // 見失った最後の座標（鼻の位置）

        function startCamera() {
            statusText.innerText = "ｶﾒﾗを起動しています...";
            navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: "environment" }, width: 640, height: 480 } })
                .then((stream) => {
                    video.srcObject = stream;
                    statusText.innerText = "✅ ロックオンしたい人をタップしてください。";
                    startPoseDetection();
                })
                .catch((err) => {
                    statusText.innerText = "❌ ｶﾒﾗの起動に失敗しました: " + err;
                });
        }

        // 📸 服の色（胸元付近）のピクセルからHSL色を取得する関数
        function getBodyColor(landmarks) {
            if (!video.videoWidth || !landmarks) return null;
            
            // 左肩(11)と右肩(12)の中間（胸元）の座標を計算
            const midX = Math.floor(((landmarks[11].x + landmarks[12].x) / 2) * canvasElement.width);
            const midY = Math.floor(((landmarks[11].y + landmarks[12].y) / 2) * canvasElement.height);

            try {
                // 指定座標の1ピクセルデータを取得
                const pixel = canvasCtx.getImageData(midX, midY, 1, 1).data;
                let r = pixel[0] / 255, g = pixel[1] / 255, b = pixel[2] / 255;
                let max = Math.max(r, g, b), min = Math.min(r, g, b);
                let h, s, l = (max + min) / 2;

                if (max === min) { h = s = 0; } 
                else {
                    let d = max - min;
                    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                    switch (max) {
                        case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                        case g: h = (b - r) / d + 2; break;
                        case b: h = (r - g) / d + 4; break;
                    }
                    h /= 6;
                }
                return { h: h * 360, s: s * 100, l: l * 100 }; // 色相(H)、彩度(S)、明度(L)
            } catch (e) {
                return null;
            }
        }

        // 👆 画面タップ時のロックオン処理
        canvasElement.addEventListener('click', (event) => {
            if (latestLandmarks) {
                isLocked = true;
                isTargetVisible = true;
                
                // 🎯 タップした瞬間の「服の色」と「位置」を記憶に焼き付ける
                savedColor = getBodyColor(latestLandmarks);
                lastKnownNosePosition = { x: latestLandmarks[0].x, y: latestLandmarks[0].y };
                
                statusText.innerText = "🎯 ターゲットの「服の色」と「位置」を記憶してロックしました！";
                
                wasHandDown = true;
                wasStanding = true;
                defaultHipY = null;
            } else {
                isLocked = false;
                isTargetVisible = false;
                savedColor = null;
                statusText.innerText = "🔓 ロック解除しました。";
            }
        });

        function startPoseDetection() {
            const pose = new window.Pose({
                locateFile: (file) => "https://cdn.jsdelivr.net/npm/@mediapipe/pose/" + file
            });

            pose.setOptions({
                modelComplexity: 1,
                smoothLandmarks: true,
                enableSegmentation: false,
                minDetectionConfidence: 0.8,
                minTrackingConfidence: 0.8
            });

            pose.onResults((results) => {
                canvasElement.width = video.videoWidth || window.innerWidth;
                canvasElement.height = video.videoHeight || window.innerHeight;
                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

                if (results.poseLandmarks) {
                    latestLandmarks = results.poseLandmarks;
                    const nose = latestLandmarks[0];

                    if (isLocked) {
                        const currentColor = getBodyColor(latestLandmarks);

                        if (!isTargetVisible) {
                            // 🔍 【ダブル復帰判定】ターゲットがカメラに戻ってきたかをチェック
                            if (currentColor && savedColor) {
                                // 1. 最後に消えた座標との距離を計算
                                const dist = Math.sqrt(Math.pow(nose.x - lastKnownNosePosition.x, 2) + Math.pow(nose.y - lastKnownNosePosition.y, 2));
                                
                                // 2. 服の色相(H)の差分を計算
                                let hDiff = Math.abs(savedColor.h - currentColor.h);
                                if (hDiff > 180) hDiff = 360 - hDiff;

                                // 💡 条件：最後に消えた端から近く(35%以内)、かつ服の色相ズレが35度以内なら「本人」とみなす
                                if (dist < 0.35 && hDiff < 35) {
                                    isTargetVisible = true;
                                    statusText.innerText = "🔄 服の色と位置が一致！自動ロックオンを復帰しました！";
                                }
                            }
                        }

                        if (isTargetVisible) {
                            // 追従中は、現在の位置を常に「最後に確認された位置」として更新し続ける
                            lastKnownNosePosition = { x: nose.x, y: nose.y };
                        }
                    }

                    // 🎨 骨格の描画
                    if (!isLocked || isTargetVisible) {
                        const lineColor = isLocked ? '#00FF66' : '#FFFFFF';
                        window.drawConnectors(canvasCtx, latestLandmarks, window.POSE_CONNECTIONS, {color: lineColor, lineWidth: 3});
                        window.drawLandmarks(canvasCtx, latestLandmarks, {color: '#FF0000', radius: 4});
                    } else {
                        // ターゲットではない別人はグレー描画にして、カウントを完全に無視する
                        window.drawConnectors(canvasCtx, latestLandmarks, window.POSE_CONNECTIONS, {color: '#444444', lineWidth: 1});
                        window.drawLandmarks(canvasCtx, latestLandmarks, {color: '#666666', radius: 1});
                        statusText.innerText = "🔍 ターゲットの戻りを待っています...（別人を無視中）";
                    }

                    // 🙋‍♂️ アクション＆カウント判定（ロックされたターゲットのみが対象）
                    if (!isLocked || isTargetVisible) {
                        const noseY = latestLandmarks[0].y;
                        const leftWristY = latestLandmarks[15].y;
                        const rightWristY = latestLandmarks[16].y;
                        const currentHipY = (latestLandmarks[23].y + latestLandmarks[24].y) / 2;

                        if (defaultHipY === null) { defaultHipY = currentHipY; }

                        const isHandUp = (leftWristY < noseY) || (rightWristY < noseY);
                        const isSquatting = (currentHipY > defaultHipY + 0.15);

                        if (isHandUp && wasHandDown) {
                            countA++; countNumA.innerText = countA; wasHandDown = false;
                            statusText.innerText = `🙋‍♂️ カウントA: ${countA}`;
                        } else if (!isHandUp) { wasHandDown = true; }

                        if (isSquatting && wasStanding) {
                            countB++; countNumB.innerText = countB; wasStanding = false;
                            statusText.innerText = `🧘 カウントb: ${countB}`;
                        } else if (!isSquatting && (currentHipY < defaultHipY + 0.05)) { wasStanding = true; }
                    }

                } else {
                    // ⚠️ 誰も映っていない、または完全に見失った瞬間
                    latestLandmarks = null;
                    if (isLocked && isTargetVisible) {
                        isTargetVisible = false; // ターゲット捜索モードへ

                        // 最後に消えた座標から方向テキストを作成
                        let direction = "";
                        if (lastKnownNosePosition.x < 0.35) direction = "左端";
                        else if (lastKnownNosePosition.x > 0.65) direction = "右端";
                        else if (lastKnownNosePosition.y < 0.35) direction = "上端";
                        else if (lastKnownNosePosition.y > 0.65) direction = "下端";
                        else direction = "中央付近";

                        statusText.innerText = `🔍 ターゲットが【${direction}】から消えました。同じ服の色の再入場を待っています...`;
                    }
                }
            });

            const frameLoop = async () => {
                if (video.readyState === video.HAVE_ENOUGH_DATA) {
                    await pose.send({ image: video });
                }
                window.requestAnimationFrame(frameLoop);
            };
            frameLoop();
        }

        window.addEventListener('load', startCamera);
    </script>
</body>
</html>
