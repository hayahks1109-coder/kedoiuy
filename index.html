<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>特定人物追従カウンター</title>
    <!-- MediaPipe Pose 読み込み -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #222; color: #fff; overflow: hidden; }
        #header { position: absolute; top: 0; width: 100%; text-align: center; background: rgba(0,0,0,0.7); padding: 10px 0; z-index: 10; }
        .counter-container { display: flex; justify-content: space-around; margin: 5px 20px; }
        .counter { background: #333; padding: 10px 20px; border-radius: 10px; width: 40%; }
        .counter-val { font-size: 24px; color: #0f0; font-weight: bold; }
        #video-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 2; }
        #toast { position: absolute; top: 150px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 8px 16px; border-radius: 5px; font-size: 14px; z-index: 11; display: none; }
        #lockon-toggle { position: absolute; top: 110px; left: 50%; transform: translateX(-50%); z-index: 11; }
    </style>
</head>
<body>

<div id="header">
    <h2>特定人物追従カウンター</h2>
    <div class="counter-container">
        <div class="counter">手を挙げる(A): <div id="count-a" class="counter-val">0</div></div>
        <div class="counter">しゃがむ(b): <div id="count-b" class="counter-val">0</div></div>
    </div>
</div>

<div id="lockon-toggle">
    <label><input type="checkbox" id="lockon-mode" checked> ロックオンしたい人をタップしてください。</label>
</div>

<div id="toast"></div>

<div id="video-container">
    <video id="webcam" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>
</div>

<script>
const videoElement = document.getElementById('webcam');
const canvasElement = document.getElementById('output_canvas');
const canvasCtx = canvasElement.getContext('2d');
const toast = document.getElementById('toast');
const lockonModeCheck = document.getElementById('lockon-mode');

let countA = 0;
let countB = 0;

let trackingState = {
    isTracking: false,
    lostEdge: null,       
    lastPosition: null,
    targetColor: null // 記憶した服の平均色 {r, g, b}
};

const EDGE_THRESHOLD = 0.30; 
const COLOR_TOLERANCE = 80; // 色の許容判定距離

function showToast(message) {
    toast.textContent = message;
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 3000);
}

function getEdgeLocation(x, y) {
    if (x < EDGE_THRESHOLD) return 'LEFT';
    if (x > (1 - EDGE_THRESHOLD)) return 'RIGHT';
    if (y < EDGE_THRESHOLD) return 'TOP';
    if (y > (1 - EDGE_THRESHOLD)) return 'BOTTOM';
    return 'CENTER'; 
}

// 指定したエリア（10x10ピクセル）の「平均色」を計算する関数
function getAverageColor(centerX, centerY) {
    const boxSize = 10;
    const startX = Math.max(0, Math.floor(centerX * canvasElement.width - boxSize / 2));
    const startY = Math.max(0, Math.floor(centerY * canvasElement.height - boxSize / 2));
    
    try {
        const imgData = canvasCtx.getImageData(startX, startY, boxSize, boxSize).data;
        let r = 0, g = 0, b = 0;
        const count = imgData.length / 4;

        for (let i = 0; i < imgData.length; i += 4) {
            r += imgData[i];
            g += imgData[i + 1];
            b += imgData[i + 2];
        }

        return {
            r: Math.round(r / count),
            g: Math.round(g / count),
            b: Math.round(b / count)
        };
    } catch (e) {
        return null;
    }
}

// 記憶した色と現在の色の「差分距離」を比較する関数
function isSameColor(currentX, currentY) {
    if (!trackingState.targetColor) return true; // 色記憶がなければパス
    
    const currentColor = getAverageColor(currentX, currentY);
    if (!currentColor) return false;

    const colorDiff = Math.sqrt(
        Math.pow(currentColor.r - trackingState.targetColor.r, 2) +
        Math.pow(currentColor.g - trackingState.targetColor.g, 2) +
        Math.pow(currentColor.b - trackingState.targetColor.b, 2)
    );

    return colorDiff < COLOR_TOLERANCE;
}

// タップ時の処理
canvasElement.addEventListener('click', (e) => {
    if (!lockonModeCheck.checked) return;
    
    const rect = canvasElement.getBoundingClientRect();
    const clickX = (e.clientX - rect.left) / rect.width;
    const clickY = (e.clientY - rect.top) / rect.height;

    if (latestPoseLandmarks) {
        const leftShoulder = latestPoseLandmarks[11];
        const rightShoulder = latestPoseLandmarks[12];
        const leftHip = latestPoseLandmarks[23];
        
        // 胴体の中央付近（胸元〜お腹）の座標を計算
        const chestX = (leftShoulder.x + rightShoulder.x) / 2;
        const chestY = (leftShoulder.y + leftHip.y) / 2;
        
        const dist = Math.hypot(chestX - clickX, chestY - clickY);
        
        if (dist < 0.2) { 
            trackingState.isTracking = true;
            trackingState.lostEdge = null;
            trackingState.lastPosition = { x: chestX, y: chestY };
            // ★胸元エリアの平均色を取得して記憶
            trackingState.targetColor = getAverageColor(chestX, chestY);
            showToast("ターゲットを確定し、ロックオンしました！");
        }
    }
});

let latestPoseLandmarks = null;

function onResults(results) {
    canvasElement.width = videoElement.videoWidth;
    canvasElement.height = videoElement.videoHeight;
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    
    if (!results.poseLandmarks) {
        handleTrackingLost();
        return;
    }

    latestPoseLandmarks = results.poseLandmarks;
    
    // 胴体の中心座標をターゲットの判定位置とする
    const leftShoulder = latestPoseLandmarks[11];
    const rightShoulder = latestPoseLandmarks[12];
    const leftHip = latestPoseLandmarks[23];
    const chestX = (leftShoulder.x + rightShoulder.x) / 2;
    const chestY = (leftShoulder.y + leftHip.y) / 2;
    const currentPosition = { x: chestX, y: chestY };

    if (trackingState.isTracking) {
        trackingState.lastPosition = currentPosition;
        drawSkeleton(results.poseLandmarks);
        checkActions(results.poseLandmarks);
    } else {
        if (trackingState.lostEdge) {
            const detectedEdge = getEdgeLocation(currentPosition.x, currentPosition.y);
            
            // 条件1: ロストした端と同じ端から出ているか（または中央ロストか）
            const isCorrectEdge = (trackingState.lostEdge === 'CENTER') || (detectedEdge === trackingState.lostEdge);
            // 条件2: 服の平均色が一致しているか
            const isMatchingColor = isSameColor(currentPosition.x, currentPosition.y);

            // ★「端」と「服の色」の両方が合致した場合のみロックオン復帰
            if (isCorrectEdge && isMatchingColor) {
                trackingState.isTracking = true;
                trackingState.lostEdge = null;
                trackingState.lastPosition = currentPosition;
                showToast("ターゲットが戻りました！自動追従を再開します。");
                drawSkeleton(results.poseLandmarks);
            } else {
                console.log(`無視: 端一致=${isCorrectEdge}, 色一致=${isMatchingColor}`);
            }
        }
    }
}

function handleTrackingLost() {
    if (trackingState.isTracking && trackingState.lastPosition) {
        const exitEdge = getEdgeLocation(trackingState.lastPosition.x, trackingState.lastPosition.y);
        trackingState.lostEdge = exitEdge;
        trackingState.isTracking = false;
        
        if (exitEdge === 'CENTER') {
            showToast("ターゲットを見失いました。(画面内でロスト)");
        } else {
            showToast(`ターゲットを見失いました。(${exitEdge}端エリアでロスト)`);
        }
    }
}

function drawSkeleton(landmarks) {
    canvasCtx.fillStyle = '#00FF00';
    canvasCtx.strokeStyle = '#00FF00';
    canvasCtx.lineWidth = 4;

    const points = [11, 12, 24, 23]; 
    canvasCtx.beginPath();
    canvasCtx.moveTo(landmarks[points[0]].x * canvasElement.width, landmarks[points[0]].y * canvasElement.height);
    for(let i=1; i<points.length; i++) {
        canvasCtx.lineTo(landmarks[points[i]].x * canvasElement.width, landmarks[points[i]].y * canvasElement.height);
    }
    canvasCtx.closePath();
    canvasCtx.stroke();
}

let wasHandUp = false;
let wasSquat = false;

function checkActions(landmarks) {
    const leftWrist = landmarks[15];
    const leftShoulder = landmarks[11];
    const leftHip = landmarks[23];

    const isHandUp = leftWrist.y < leftShoulder.y - 0.1;
    if (isHandUp && !wasHandUp) {
        countA++;
        document.getElementById('count-a').textContent = countA;
    }
    wasHandUp = isHandUp;

    const isSquat = leftHip.y > 0.7; 
    if (isSquat && !wasSquat) {
        countB++;
        document.getElementById('count-b').textContent = countB;
    }
    wasSquat = isSquat;
}

const pose = new Pose({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
});

pose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true,
    enableSegmentation: false,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5
});
pose.onResults(onResults);

const camera = new Camera(videoElement, {
    onFrame: async () => {
        await pose.send({image: videoElement});
    },
    width: 640,
    height: 480,
    facingMode: 'environment'
});
camera.start();

</script>
</body>
</html>
