<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>色・位置記憶自動復帰 × アクションカウンター</title>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000; font-family: sans-serif;
        }

        .camera-container {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            overflow: hidden;
        }
        
        #webcam { width: 100%; height: 100%; object-fit: cover; }
        #output_canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* 3等分グリッド線 */
        .grid-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .grid-line-v1 { position: absolute; top: 0; left: 33.3%; width: 1px; height: 100%; background: rgba(255,255,255,0.4); }
        .grid-line-v2 { position: absolute; top: 0; left: 66.6%; width: 1px; height: 100%; background: rgba(255,255,255,0.4); }
        .grid-line-h1 { position: absolute; top: 33.3%; left: 0; width: 100%; height: 1px; background: rgba(255,255,255,0.4); }
        .grid-line-h2 { position: absolute; top: 66.6%; left: 0; width: 100%; height: 1px; background: rgba(255,255,255,0.4); }

        /* 📱 UIレイヤー */
        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; padding: 20px;
            box-sizing: border-box;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
            pointer-events: none; text-align: center;
        }

        h1 { font-size: 1.1rem; margin: 0 0 5px 0; color: #fff; }
        .sub-title { font-size: 0.8rem; color: #00FF66; margin: 0 0 10px 0; font-weight: bold; }
        
        .counters-wrapper { display: flex; justify-content: center; gap: 15px; margin-top: 5px; }
        .counter-box {
            background: rgba(0, 0, 0, 0.6); padding: 8px 15px; border-radius: 20px;
            font-size: 1.1rem; font-weight: bold; color: #fff; min-width: 120px;
        }
        .count-num { font-size: 2rem; margin-left: 8px; vertical-align: middle; }
        #count_numA { color: #00FF66; }
        #count_numB { color: #FFCC00; }

        #status { font-weight: bold; color: #ddd; margin: 12px 0 0 0; font-size: 0.9rem; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
</head>
<body>

    <div class="camera-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="output_canvas"></canvas>
        <div class="grid-overlay">
            <div class="grid-line-v1"></div>
            <div class="grid-line-v2"></div>
            <div class="grid-line-h1"></div>
            <div class="grid-line-h2"></div>
        </div>
    </div>

    <div class="ui-layer">
        <h1>自動復帰型・人物カウンター</h1>
        <div class="sub-title">初回タップ以降、見失っても「同じエリア×同じ服の色」で自動再ロックします</div>
        <div class="counters-wrapper">
            <div class="counter-box">手を挙げる(A): <span id="count_numA" class="count-num">0</span></div>
            <div class="counter-box">しゃがむ(b): <span id="count_numB" class="count-num">0</span></div>
        </div>
        <p id="status">ｼｽﾃﾑ起動中...</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <script>
        const video = document.getElementById('webcam');
        const statusText = document.getElementById('status');
        const countNumA = document.getElementById('count_numA');
        const countNumB = document.getElementById('count_numB');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');

        let countA = 0;
        let countB = 0;

        let wasHandDown = true;
        let wasStanding = true;
        let defaultHipY = null; 

        // 🎯 ロックオン＆特徴記憶用変数
        let lastPeopleData = []; 
        let lockedPersonIndex = null; 
        let pose = null; 

        // 🧠 記憶バンク
        let isSeekingLostTarget = false; // 見失って捜索中かどうかのフラグ
        let savedTargetColor = null;     // ロックオンした人の服（胸元）のHSL色データ
        let savedLastPosition = { x: 0.5, y: 0.5 }; // 最後に確認された位置

        function startCamera() {
            statusText.innerText = "ｶﾒﾗを起動しています...";
            navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: "environment" }, width: 640, height: 480 } })
                .then((stream) => {
                    video.srcObject = stream;
                    statusText.innerText = "✅ 追いたい人を画面上でタップして選択してください。";
                    startPoseDetection();
                })
                .catch((err) => {
                    statusText.innerText = "❌ ｶﾒﾗの起動に失敗しました: " + err;
                });
        }

        // 📸 特定の座標（お腹・胸元付近）のピクセルから簡易的にHSL色を取得する関数
        function getBodyColor(landmarks) {
            if (!video.videoWidth) return null;
            
            // 左肩(11)と右肩(12)の中間を胸元として色をサンプリング
            const midX = Math.floor(((landmarks[11].x + landmarks[12].x) / 2) * canvasElement.width);
            const midY = Math.floor(((landmarks[11].y + landmarks[12].y) / 2) * canvasElement.height);

            try {
                const pixel = canvasCtx.getImageData(midX, midY, 1, 1).data;
                let r = pixel[0] / 255, g = pixel[1] / 255, b = pixel[2] / 255;
                let max = Math.max(r, g, b), min = Math.min(r, g, b);
                let h, s, l = (max + min) / 2;

                if (max === min) { h = s = 0; } 
                else {
                    let d = max - min;
                    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                    switch (max) {
                        case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                        case g: h = (b - r) / d + 2; break;
                        case b: h = (r - g) / d + 4; break;
                    }
                    h /= 6;
                }
                return { h: h * 360, s: s * 100, l: l * 100 }; // HSL形式で返す（光沢変化に強いため）
            } catch (e) {
                return null;
            }
        }

        // 👆 画面タップ時のロックオン処理
        canvasElement.addEventListener('click', (event) => {
            const rect = canvasElement.getBoundingClientRect();
            const tapX = (event.clientX - rect.left) / rect.width;
            const tapY = (event.clientY - rect.top) / rect.height;

            let closestIndex = null;
            let minDistance = 0.25; 

            lastPeopleData.forEach((landmarks, idx) => {
                const nose = landmarks[0];
                const distance = Math.sqrt(Math.pow(nose.x - tapX, 2) + Math.pow(nose.y - tapY, 2));
                if (distance < minDistance) {
                    minDistance = distance;
                    closestIndex = idx;
                }
            });

            if (closestIndex !== null) {
                lockedPersonIndex = closestIndex;
                isSeekingLostTarget = false;
                
                // タップされた瞬間にその人の服の色と位置を記憶
                savedTargetColor = getBodyColor(lastPeopleData[closestIndex]);
                savedLastPosition = { x: lastPeopleData[closestIndex][0].x, y: lastPeopleData[closestIndex][0].y };

                statusText.innerText = `🎯 ターゲットをロックし、特徴（色・位置）を記憶しました！`;
                wasHandDown = true; wasStanding = true; defaultHipY = null; 
                
                if (pose) { pose.setOptions({ maxNumPeople: 1 }); }
            } else {
                lockedPersonIndex = null;
                isSeekingLostTarget = false;
                savedTargetColor = null;
                statusText.innerText = `🔓 ロックオンを解除しました（全員をスキャン中）`;
                if (pose) { pose.setOptions({ maxNumPeople: 4 }); }
            }
        });

        function startPoseDetection() {
            pose = new window.Pose({
                locateFile: (file) => "https://cdn.jsdelivr.net/npm/@mediapipe/pose/" + file
            });

            pose.setOptions({
                modelComplexity: 1, smoothLandmarks: true, enableSegmentation: false,
                minDetectionConfidence: 0.5, minTrackingConfidence: 0.5, maxNumPeople: 4
            });

            pose.onResults((results) => {
                canvasElement.width = video.videoWidth || window.innerWidth;
                canvasElement.height = video.videoHeight || window.innerHeight;
                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

                let poses = [];
                if (results.multiPoseLandmarks) { poses = results.multiPoseLandmarks; } 
                else if (results.poseLandmarks) { poses = [results.poseLandmarks]; }

                // 描画用に今のカメラ映像における色を拾うため、描画直前に一時保存
                lastPeopleData = poses;

                // 🔍 【コアシステム】見失い捜索モード中の自動マッチング処理
                if (isSeekingLostTarget && poses.length > 0 && savedTargetColor) {
                    let bestMatchIndex = null;
                    let bestScore = 999;

                    poses.forEach((landmarks, idx) => {
                        const currentColor = getBodyColor(landmarks);
                        if (!currentColor) return;

                        // 1. 色相(H)の差分を計算（0〜180度）
                        let hDiff = Math.abs(savedTargetColor.h - currentColor.h);
                        if (hDiff > 180) hDiff = 360 - hDiff;

                        // 2. 最後に消えた座標との距離を計算
                        const dist = Math.sqrt(Math.pow(landmarks[0].x - savedLastPosition.x, 2) + Math.pow(landmarks[0].y - savedLastPosition.y, 2));

                        // 総合スコア（色相のズレ + 距離ペナルティ。数値が低いほど同一人物の可能性大）
                        const totalScore = hDiff + (dist * 150);

                        // 色のズレが35度以内、かつ移動距離が極端に離れていなければ
                        if (hDiff < 35 && totalScore < bestScore) {
                            bestScore = totalScore;
                            bestMatchIndex = idx;
                        }
                    });

                    // 同一人物だと判定できたら、自動でロックオンを復活！
                    if (bestMatchIndex !== null) {
                        lockedPersonIndex = bestMatchIndex;
                        isSeekingLostTarget = false;
                        statusText.innerText = "🔄 ターゲットが戻ってきたため、自動で再ロックオンしました！";
                        if (pose) { pose.setOptions({ maxNumPeople: 1 }); }
                    }
                }

                if (poses.length > 0) {
                    let activeIndex = 0;
                    
                    if (lockedPersonIndex !== null && poses[activeIndex]) {
                        activeIndex = 0; 
                        // ロック中、次のフレームのために常に最新の位置を記憶し続ける
                        savedLastPosition = { x: poses[activeIndex][0].x, y: poses[activeIndex][0].y };
                    } 
                    else if (lockedPersonIndex !== null) {
                        // 👁️‍🗨️ 画面内からターゲットが消えた瞬間
                        lockedPersonIndex = null;
                        isSeekingLostTarget = true; // 捜索モードへ移行
                        statusText.innerText = "🔍 ターゲットが見失われました。同じ服の人の再入場を待っています...";
                        if (pose) { pose.setOptions({ maxNumPeople: 4 }); } // 周りを探すため4人スキャンに戻す
                    }

                    // 🎨 骨格描画
                    poses.forEach((landmarks, idx) => {
                        const isTarget = (idx === activeIndex && !isSeekingLostTarget);
                        if (lockedPersonIndex === null) {
                            window.drawConnectors(canvasCtx, landmarks, window.POSE_CONNECTIONS, {color: '#FFFFFF', lineWidth: 2});
                            window.drawLandmarks(canvasCtx, landmarks, {color: '#888888', radius: 2});
                        } else if (isTarget) {
                            window.drawConnectors(canvasCtx, landmarks, window.POSE_CONNECTIONS, {color: '#00FF66', lineWidth: 4});
                            window.drawLandmarks(canvasCtx, landmarks, {color: '#FF0000', radius: 4});
                        }
                    });

                    // 🧠 アクション判定処理
                    if (lockedPersonIndex !== null && poses[activeIndex]) {
                        const landmarks = poses[activeIndex];
                        const noseY = landmarks[0].y;
                        const leftWristY = landmarks[15].y;
                        const rightWristY = landmarks[16].y;
                        const currentHipY = (landmarks[23].y + landmarks[24].y) / 2;

                        if (defaultHipY === null) { defaultHipY = currentHipY; }

                        const isHandUp = (leftWristY < noseY) || (rightWristY < noseY);
                        const isSquatting = (currentHipY > defaultHipY + 0.15);

                        if (isHandUp && wasHandDown) {
                            countA++; countNumA.innerText = countA; wasHandDown = false;
                            statusText.innerText = `🙋‍♂️ カウントA: ${countA}`;
                        } else if (!isHandUp) { wasHandDown = true; }

                        if (isSquatting && wasStanding) {
                            countB++; countNumB.innerText = countB; wasStanding = false;
                            statusText.innerText = `🧘 カウントb: ${countB}`;
                        } else if (!isSquatting && (currentHipY < defaultHipY + 0.05)) { wasStanding = true; }
                    }
                } else {
                    // 画面に誰も映っていない時、もし元々ロックオンしていたなら捜索モードのまま待機
                    if (lockedPersonIndex !== null) {
                        lockedPersonIndex = null;
                        isSeekingLostTarget = true;
                        if (pose) { pose.setOptions({ maxNumPeople: 4 }); }
                    }
                }
            });

            const frameLoop = async () => {
                if (video.readyState === video.HAVE_ENOUGH_DATA) {
                    await pose.send({ image: video });
                }
                window.requestAnimationFrame(frameLoop);
            };
            frameLoop();
        }

        window.addEventListener('load', startCamera);
    </script>
</body>
</html>
