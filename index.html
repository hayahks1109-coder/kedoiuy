
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>カメラテスト × GAS連携</title>
</head>
<body>
    <h1>カメラ表示 × GAS送信テスト</h1>
    
    <video id="webcam" autoplay playsinline style="width: 320px; height: 240px; transform: scaleX(-1);"></video>
    <br><br>
    
    <button id="sendBtn">現在の状況をGASに送信</button>
    <p id="status">カメラ起動中...</p>

    <script>
        const video = document.getElementById('webcam');
        const sendBtn = document.getElementById('sendBtn');
        const statusText = document.getElementById('status');
        
        // あなたの本物のGASウェブアプリURLです
        const GAS_URL = "https://script.google.com/macros/s/AKfycbysSGzFaaHnLPqtirCokY6SiVl98_qPUfA9g5QPBw6OjdOQ3anP9clYtYMfA65C-g3i/exec";

        navigator.mediaDevices.getUserMedia({ video: true })
            .then((stream) => {
                video.srcObject = stream;
                statusText.innerText = "カメラが正常に起動しました！ボタンを押してGASへ送信できます。";
            })
            .catch((err) => {
                statusText.innerText = "カメラの起動に失敗しました: " + err;
            });

        sendBtn.addEventListener('click', async () => {
            statusText.innerText = "GASへ送信中...";
            
            const payload = {
                resultMessage: "GitHub Pagesからのカメラ連携テスト成功"
            };

            try {
                const response = await fetch(GAS_URL, {
                    method: "POST",
                    mode: "cors",
                    headers: {
                        "Content-Type": "text/plain"
                    },
                    body: JSON.stringify(payload)
                });
                
                const resData = await response.json();
                if(resData.status === "success") {
                    statusText.innerText = "🚀 送信に成功しました！";
                } else {
                    statusText.innerText = "❌ GAS側でエラーが発生: " + resData.message;
                }
            } catch (error) {
                statusText.innerText = "❌ 送信失敗。";
            }
        });
    </script>
</body>
</html>
