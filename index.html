<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ｶﾒﾗﾃｽﾄ × 自動カウントアプリ</title>
    <style>
        /* 画面全体の余白をゼロにし、スクロールさせない設定 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }

        /* 📷 カメラと全体を重ねるコンテナ（画面いっぱいに広げる） */
        .camera-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        
        /* ビデオを隙間なく全画面表示（はみ出た部分は自動カット） */
        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 描画用キャンバスも全画面に重ねる */
        #output_canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* グリッド線のデザイン（3等分の網の目） */
        .grid-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
        }
        .grid-line-v1 { position: absolute; top: 0; left: 33.3%; width: 1px; height: 100%; background: rgba(255,255,255,0.4); }
        .grid-line-v2 { position: absolute; top: 0; left: 66.6%; width: 1px; height: 100%; background: rgba(255,255,255,0.4); }
        .grid-line-h1 { position: absolute; top: 33.3%; left: 0; width: 100%; height: 1px; background: rgba(255,255,255,0.4); }
        .grid-line-h2 { position: absolute; top: 66.6%; left: 0; width: 100%; height: 1px; background: rgba(255,255,255,0.4); }

        /* 📱 画面上部に被せる文字情報エリア */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
            pointer-events: none; /* カメラ操作等の邪魔をしない */
            text-align: center;
        }

        h1 { font-size: 1.1rem; margin: 0 0 5px 0; color: #fff; }
        
        /* 🔢 カウント表示（全画面で見えやすいよう、少し半透明の黒背景の上に表示） */
        .counter-container {
            display: inline-block;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #fff;
            margin-top: 5px;
        }
        #count_num {
            font-size: 2.2rem;
            color: #00FF66;
            margin-left: 10px;
            vertical-align: middle;
        }

        #status { font-weight: bold; color: #ddd; margin: 8px 0 0 0; font-size: 0.9rem; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div class="camera-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="output_canvas"></canvas>
        <div class="grid-overlay">
            <div class="grid-line-v1"></div>
            <div class="grid-line-v2"></div>
            <div class="grid-line-h1"></div>
            <div class="grid-line-h2"></div>
        </div>
    </div>

    <div class="ui-layer">
        <h1>グー➔パーで自動カウント</h1>
        <div class="counter-container">
            カウント:<span id="count_num
