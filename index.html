<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ｶﾒﾗﾃｽﾄ × ロックオン式カウントアプリ</title>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000; font-family: sans-serif;
        }

        .camera-container {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            overflow: hidden;
        }
        
        #webcam { width: 100%; height: 100%; object-fit: cover; }
        #output_canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* 3等分グリッド線 */
        .grid-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .grid-line-v1 { position: absolute; top: 0; left: 33.3%; width: 1px; height: 100%; background: rgba(255,255,255,0.4); }
        .grid-line-v2 { position: absolute; top: 0; left: 66.6%; width: 1px; height: 100%; background: rgba(255,255,255,0.4); }
        .grid-line-h1 { position: absolute; top: 33.3%; left: 0; width: 100%; height: 1px; background: rgba(255,255,255,0.4); }
        .grid-line-h2 { position: absolute; top: 66.6%; left: 0; width: 100%; height: 1px; background: rgba(255,255,255,0.4); }

        /* 📱 UIレイヤー */
        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; padding: 20px;
            box-sizing: border-box;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
            pointer-events: none; text-align: center;
        }

        h1 { font-size: 1.1rem; margin: 0 0 5px 0; color: #fff; }
        .sub-title { font-size: 0.8rem; color: #aaa; margin: 0 0 10px 0; }
        
        .counters-wrapper { display: flex; justify-content: center; gap: 15px; margin-top: 5px; }
        .counter-box {
            background: rgba(0, 0, 0, 0.6); padding: 8px 15px; border-radius: 20px;
            font-size: 1.1rem; font-weight: bold; color: #fff; min-width: 120px;
        }
        .count-num { font-size: 2rem; margin-left: 8px; vertical-align: middle; }
        #count_num1 { color: #00FF66; }
        #count_num2 { color: #FFCC00; }

        #status { font-weight: bold; color: #ddd; margin: 12px 0 0 0; font-size: 0.9rem; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div class="camera-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="output_canvas"></canvas>
        <div class="grid-overlay">
            <div class="grid-line-v1"></div>
            <div class="grid-line-v2"></div>
            <div class="grid-line-h1"></div>
            <div class="grid-line-h2"></div>
        </div>
    </div>

    <div class="ui-layer">
        <h1>ターゲット選択式・自動カウンター</h1>
        <div class="sub-title">画面内の手をタップするとロックオン（他は追従オフ）します</div>
        <div class="counters-wrapper">
            <div class="counter-box">✊➔🖐: <span id="count_num1" class="count-num">0</span></div>
            <div class="counter-box">✌➔🖐: <span id="count_num2" class="count-num">0</span></div>
        </div>
        <p id="status">ｼｽﾃﾑ起動中...</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <script>
        const video = document.getElementById('webcam');
        const statusText = document.getElementById('status');
        const countNum1 = document.getElementById('count_num1');
        const countNum2 = document.getElementById('count_num2');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');

        let count1 = 0;
        let count2 = 0;
        let wasRock = false;
        let wasScissors = false;

        // 🎯 ロックオン管理用変数
        let lastHandsData = []; 
        let lockedHandIndex = null; 

        function startCamera() {
            statusText.innerText = "ｶﾒﾗを起動しています...";
            navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: "environment" }, width: 640, height: 480 } })
                .then((stream) => {
                    video.srcObject = stream;
                    statusText.innerText = "✅ 追いたい手を画面上でタップして選択してください。";
                    startLightweightDetection();
                })
                .catch((err) => {
                    statusText.innerText = "❌ ｶﾒﾗの起動に失敗しました: " + err;
                });
        }

        // 👆 画面タップ時のロックオン処理
        canvasElement.addEventListener('click', (event) => {
            const rect = canvasElement.getBoundingClientRect();
            const tapX = (event.clientX - rect.left) / rect.width;
            const tapY = (event.clientY - rect.top) / rect.height;

            let closestIndex = null;
            let minDistance = 0.15; 

            lastHandsData.forEach((landmarks, idx) => {
                const wrist = landmarks[0];
                const distance = Math.sqrt(Math.pow(wrist.x - tapX, 2) + Math.pow(wrist.y - tapY, 2));
                if (distance < minDistance) {
                    minDistance = distance;
                    closestIndex = idx;
                }
            });

            if (closestIndex !== null) {
                lockedHandIndex = closestIndex;
                statusText.innerText = `🎯 ターゲットをロックオンしました！`;
                wasRock = false;
                wasScissors = false;
            } else {
                lockedHandIndex = null;
                statusText.innerText = `🔓 ロックオンを解除しました（すべての手をスキャン中）`;
            }
        });

        function startLightweightDetection() {
            const hands = new window.Hands({
                locateFile: (file) => "https://cdn.jsdelivr.net/npm/@mediapipe/hands/" + file
            });

            hands.setOptions({
                maxNumHands: 4, 
                modelComplexity: 1,
                minDetectionConfidence: 0.6,
                minTrackingConfidence: 0.6
            });

            hands.onResults((results) => {
                canvasElement.width = video.videoWidth || window.innerWidth;
                canvasElement.height = video.videoHeight || window.innerHeight;
                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

                lastHandsData = results.multiHandLandmarks || [];

                if (results.multiHandLandmarks) {
                    let activeIndex = 0; 
                    
                    if (lockedHandIndex !== null && results.multiHandLandmarks[lockedHandIndex]) {
                        activeIndex = lockedHandIndex;
                    } else if (lockedHandIndex !== null) {
                        lockedHandIndex = null;
                        statusText.innerText = "⚠️ ターゲットを見失いました。再度タップしてください。";
                    }

                    // 🎨 【ここを修正】すべての手のループ処理
                    results.multiHandLandmarks.forEach((landmarks, idx) => {
                        const isTarget = (idx === activeIndex);
                        
                        // 🔓 ロックオンしていない時は、映っている全ての手を白線で追従する
                        if (lockedHandIndex === null) {
                            window.drawConnectors(canvasCtx, landmarks, window.HAND_CONNECTIONS, {color: '#FFFFFF', lineWidth: 2});
                            window.drawLandmarks(canvasCtx, landmarks, {color: '#888888', lineWidth: 1, radius: 2});
                        } 
                        // 🎯 ロックオンが完了した後は、「選ばれた手（緑）」だけを描画し、それ以外の手は完全無視（描画スキップ）
                        else if (isTarget) {
                            window.drawConnectors(canvasCtx, landmarks, window.HAND_CONNECTIONS, {color: '#00FF66', lineWidth: 4});
                            window.drawLandmarks(canvasCtx, landmarks, {color: '#FF0000', lineWidth: 1, radius: 4});
                        }
                    });

                    // 🧠 ターゲットに指定された「1つの手」だけを使って判定を行う
                    if (results.multiHandLandmarks[activeIndex]) {
                        const landmarks = results.multiHandLandmarks[activeIndex];

                        const isIndexUp = landmarks[8].y < landmarks[5].y;
                        const isMiddleUp = landmarks[12].y < landmarks[9].y;
                        const isRingUp = landmarks[16].y < landmarks[13].y;
                        const isPinkyUp = landmarks[20].y < landmarks[17].y;

                        const isRock = !isIndexUp && !isMiddleUp && !isRingUp && !isPinkyUp;
                        const isPaper = isIndexUp && isMiddleUp && isRingUp && isPinkyUp;
                        const isScissors = isIndexUp && isMiddleUp && !isRingUp && !isPinkyUp;

                        // ロックオンされている、または未ロック時のデフォルト追従時のみカウントを進める
                        if (isRock) {
                            wasRock = true;
                            wasScissors = false;
                            statusText.innerText = lockedHandIndex !== null ? "✊ ロック中の手が『グー』を構成中...（パーで左＋1）" : "✊ グーを検知中...";
                        } 
                        else if (isScissors) {
                            wasScissors = true;
                            wasRock = false;
                            statusText.innerText = lockedHandIndex !== null ? "✌ ロック中の手が『チョキ』を構成中...（パーで右＋1）" : "✌ チョキを検知中...";
                        } 
                        else if (isPaper) {
                            if (wasRock) {
                                wasRock = false;
                                count1++;
                                countNum1.innerText = count1;
                                statusText.innerText = `🖐 カウント1（✊➔🖐）を更新: ${count1}`;
                            } 
                            else if (wasScissors) {
                                wasScissors = false;
                                count2++;
                                countNum2.innerText = count2;
                                statusText.innerText = `🖐 カウント2（✌➔🖐）を更新: ${count2}`;
                            }
                        } 
                        else if (!isPaper && !isRock && !isScissors) {
                            wasRock = false;
                            wasScissors = false;
                        }
                    }
                } else {
                    if (lockedHandIndex !== null) {
                        lockedHandIndex = null; 
                    }
                }
            });

            const frameLoop = async () => {
                if (video.readyState === video.HAVE_ENOUGH_DATA) {
                    await hands.send({ image: video });
                }
                window.requestAnimationFrame(frameLoop);
            };
            frameLoop();
        }

        window.addEventListener('load', startCamera);
    </script>
</body>
</html>
