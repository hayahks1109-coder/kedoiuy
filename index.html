<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>MediaPipe × GAS 連携アプリ</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        #webcam { width: 320px; height: 240px; transform: scaleX(-1); background-color: #ccc; }
        #status { font-weight: bold; color: #333; }
    </style>
    <!-- 📌 【場所①】11行目：MediaPipeのメインライブラリURLを挟む場所 -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/wasm/vision_bundle.js" crossorigin="anonymous"></script>
</head>
<body>
    <h1>MediaPipe × GAS 連携テスト</h1>
    
    <video id="webcam" autoplay playsinline style="width: 320px; height: 240px; transform: scaleX(-1);"></video>
    <br><br>
    
    <p id="status">MediaPipe初期化中...</p>

    <script>
        const { HandLandmarker, FilesetResolver } = mpTasksVision;

        const video = document.getElementById('webcam');
        const statusText = document.getElementById('status');
        
        // 📌 【場所②】29行目：あなたのGASのウェブアプリURLを挟む場所
        const GAS_URL = "https://script.google.com/macros/s/AKfycbysSGzFaaHnLPqtirCokY6SiVl98_qPUfA9g5QPBw6OjdOQ3anP9clYtYMfA65C-g3i/exec";

        let handLandmarker;
        let isSending = false;

        async function initMediaPipe() {
            try {
                statusText.innerText = "1/3: AIライブラリ読み込み完了。WASMを読み込み中...";
                
                // 📌 【場所③】39行目：WASMファイルを読み込むURLを挟む場所
                const vision = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/wasm"
                );
                
                statusText.innerText = "2/3: 手の検出モデルをロード中...";
                
                // 📌 【場所④】45行目：手の骨格データ（AIモデル）のURLを挟む場所
                handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO",
                    numHands: 2
                });
                
                statusText.innerText = "3/3: カメラを起動しています...";
                startCamera();
            } catch (e) {
                statusText.innerText = "❌ エラー発生: " + e.message;
                console.error(e);
            }
        }

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: true })
                .then((stream) => {
                    video.srcObject = stream;
                    video.addEventListener('loadeddata', predictWebcam);
                    statusText.innerText = "✅ 準備完了！カメラに向かって手を映してください。";
                })
                .catch((err) => {
                    statusText.innerText = "❌ カメラの起動に失敗しました: " + err;
                });
        }

        let lastVideoTime = -1;
        async function predictWebcam() {
            if (video.currentTime !== lastVideoTime && handLandmarker) {
                lastVideoTime = video.currentTime;
                const results = handLandmarker.predictForVideo(video, performance.now());
                
                if (results.landmarks && results.landmarks.length > 0) {
                    const currentResult = `✋ 手が ${results.landmarks.length} つ検出されています！`;
                    statusText.innerText = currentResult;

                    if (!isSending) {
                        sendToGAS(currentResult);
                    }
                } else {
                    statusText.innerText = "👋 手を探しています... カメラに手をかざしてください。";
                }
            }
            window.requestAnimationFrame(predictWebcam);
        }

        async function sendToGAS(message) {
            isSending = true;
            try {
                await fetch(GAS_URL, {
                    method: "POST",
                    mode: "cors",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({ resultMessage: message })
                });
                setTimeout(() => { isSending = false; }, 3000);
            } catch (error) {
                setTimeout(() => { isSending = false; }, 5000);
            }
        }

        initMediaPipe();
    </script>
</body>
</html>
