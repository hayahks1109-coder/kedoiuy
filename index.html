<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ｶﾒﾗﾃｽﾄ × GAS連携ｱﾌﾟﾘ</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        .camera-container { position: relative; width: 100vw; height: 60vh; overflow: hidden; }
        #webcam { width: 100%; height: 100%; object-fit: cover; background-color: #ccc; }
        .grid-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .grid-line-v1 { position: absolute; top: 0; left: 33.3%; width: 1px; height: 100%; background: rgba(255,255,255,0.5); }
        .grid-line-v2 { position: absolute; top: 0; left: 66.6%; width: 1px; height: 100%; background: rgba(255,255,255,0.5); }
        .grid-line-h1 { position: absolute; top: 33.3%; left: 0; width: 100%; height: 1px; background: rgba(255,255,255,0.5); }
        .grid-line-h2 { position: absolute; top: 66.6%; left: 0; width: 100%; height: 1px; background: rgba(255,255,255,0.5); }
        #status { font-weight: bold; color: #333; }
    </style>
    <!-- システムにフリーズ・破壊されない安定版の単一MediaPipeライブラリ -->
    <script src="https://jsdelivr.net" crossorigin="anonymous"></script>
    <script src="https://jsdelivr.net" crossorigin="anonymous"></script>
</head>
<body>
    <h1>ピースサイン撮影 × GAS画像保存システム</h1>
    
    <div class="camera-container">
        <video id="webcam" autoplay playsinline></video>
        <div class="grid-overlay">
            <div class="grid-line-v1"></div>
            <div class="grid-line-v2"></div>
            <div class="grid-line-h1"></div>
            <div class="grid-line-h2"></div>
        </div>
    </div>
    <br><br>
    
    <p id="status">MediaPipe初期化中...</p>
    <!-- 画像撮影用の裏画面（画面には見えません） -->
    <canvas id="captureCanvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const statusText = document.getElementById('status');
        const canvas = document.getElementById('captureCanvas');
        const ctx = canvas.getContext('2d');
        
        // 完璧に動いているあなたの本物のGASウェブアプリURLです
        const GAS_URL = "https://google.com";

        let isCooldown = false;

        // 1. セキュリティ制限を100%回避する独立形式で手のAIを初期化
        const hands = new window.Hands();
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

        // 2. 手が映った時の解析処理
        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                // ✌️ ピースサイン（チョキ）の骨格判定
                const isThumbFolded = landmarks[4].x > landmarks[3].x; 
                const isIndexUp = landmarks[8].y < landmarks[6].y;   // 人差し指が伸びている
                const isMiddleUp = landmarks[12].y < landmarks[10].y; // 中指が伸びている
                const isRingFolded = landmarks[16].y > landmarks[14].y; // 薬指が曲がっている
                const isPinkyFolded = landmarks[20].y > landmarks[18].y; // 小指が曲がっている

                if (isIndexUp && isMiddleUp && isRingFolded && isPinkyFolded && !isCooldown) {
                    statusText.innerText = "✌️ ピースサインを検知！シャッターを切ります！";
                    captureAndSend();
                } else if (!isCooldown) {
                    statusText.innerText = "👋 ピースサインを待機中... カメラにピースを映してください。";
                }
            } else if (!isCooldown) {
                statusText.innerText = "📷 画面内に手を探しています...";
            }
        });

        // 3. カメラの起動とAIの合流
        statusText.innerText = "カメラを起動中...";
        const camera = new window.Camera(video, {
            onFrame: async () => { await hands.send({ image: video }); },
            width: 640, height: 480
        });

        camera.start()
            .then(() => { statusText.innerText = "✅ システム連動完了！カメラにピースをして画像保存できます！"; })
            .catch((err) => { statusText.innerText = "❌ カメラエラー: " + err; });

        // 4. 映像をパシャリと切り抜いてGASへ画像送信する処理
        async function captureAndSend() {
            isCooldown = true; // 連打・多重送信のストッパー
            statusText.innerText = "📸 パシャリ！画像をGASへ送信しています...";

            // カメラの現在のコマを写真としてサイズぴったりに切り抜く
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // 切り抜いた写真を「画像データ」としてテキスト変換
            const imageDataUrl = canvas.toDataURL('image/jpeg', 0.8);

            try {
                const response = await fetch(GAS_URL, {
                    method: "POST",
                    mode: "cors",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({ image: imageDataUrl })
                });
                
                statusText.innerText = "🚀 Googleドライブへの保存が完了しました！(5秒間待機中)";
                
                // 撮影したあとに5秒間のクールダウン（お休み）を挟んで、次のピースを待機します
                setTimeout(() => {
                    isCooldown = false;
                }, 5000);

            } catch (error) {
                statusText.innerText = "❌ 画像の送信に失敗しました: " + error.message;
                setTimeout(() => { isCooldown = false; }, 5000);
            }
        }
    </script>
</body>
</html>
