<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>MediaPipe × GAS 連携アプリ</title>
    <style>
        /* 画面を綺麗に整えるための少しの見た目調整 */
        body { font-family: sans-serif; margin: 20px; }
        #webcam { width: 320px; height: 240px; transform: scaleX(-1); background-color: #ccc; }
        #status { font-weight: bold; color: #333; }
    </style>
</head>
<body>
    <h1>MediaPipe × GAS 連携テスト</h1>
    
    <!-- カメラ映像の表示エリア -->
    <video id="webcam" autoplay playsinline></video>
    <br><br>
    
    <!-- 状況を表示するテキスト -->
    <p id="status">MediaPipe初期化中...</p>

    <!-- ブラウザが絶対にエラーを起こさない、最新のモジュール読み込み方式に変えました -->
    <script type="module">
        import { HandLandmarker, FilesetResolver } from "https://jsdelivr.net";

        const video = document.getElementById('webcam');
        const statusText = document.getElementById('status');
        
        // あなたの本物のGASウェブアプリURLです
        const GAS_URL = "https://google.com";

        let handLandmarker;
        let isSending = false;

        // 1. MediaPipeの初期化
        async function initMediaPipe() {
            try {
                statusText.innerText = "1/3: AIライブラリ読み込み完了。WASMを読み込み中...";
                const vision = await FilesetResolver.forVisionTasks(
                    "https://jsdelivr.net"
                );
                
                statusText.innerText = "2/3: 手の検出モデルをロード中...";
                handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: "https://googleapis.com",
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO",
                    numHands: 2
                });
                
                statusText.innerText = "3/3: カメラを起動しています...";
                startCamera();
            } catch (e) {
                // 万が一ここでエラーが起きてもフリーズせず、画面にエラー理由を書き出します
                statusText.innerText = "❌ エラー発生: " + e.message;
                console.error(e);
            }
        }

        // 2. カメラの起動
        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: true })
                .then((stream) => {
                    video.srcObject = stream;
                    video.addEventListener('loadeddata', predictWebcam);
                    statusText.innerText = "✅ 準備完了！カメラに向かって手を映してください。";
                })
                .catch((err) => {
                    statusText.innerText = "❌ カメラの起動に失敗しました。ブラウザのカメラ許可を確認してください: " + err;
                });
        }

        // 3. リアルタイムで手の骨格を解析するループ
        let lastVideoTime = -1;
        async function predictWebcam() {
            if (video.currentTime !== lastVideoTime && handLandmarker) {
                lastVideoTime = video.currentTime;
                const results = handLandmarker.predictForVideo(video, performance.now());
                
                // 画面に手が映ったときの処理
                if (results.landmarks && results.landmarks.length > 0) {
                    const currentResult = `✋ 手が ${results.landmarks.length} つ検出されています！`;
                    statusText.innerText = currentResult;

                    // GASが送信中でなければ、自動で送信する
                    if (!isSending) {
                        sendToGAS(currentResult);
                    }
                } else {
                    statusText.innerText = "👋 手を探しています... カメラに手をかざしてください。";
                }
            }
            window.requestAnimationFrame(predictWebcam);
        }

        // 4. GASへの自動送信
        async function sendToGAS(message) {
            isSending = true; // 送信中ロック
            try {
                await fetch(GAS_URL, {
                    method: "POST",
                    mode: "cors",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({ resultMessage: message })
                });
                // 送信に成功したら3秒待ってから次を許可（連打防止）
                setTimeout(() => { isSending = false; }, 3000);
            } catch (error) {
                // 通信エラーが起きても5秒後に復帰できるようにする
                setTimeout(() => { isSending = false; }, 5000);
            }
        }

        // アプリ起動
        initMediaPipe();
    </script>
</body>
</html>
